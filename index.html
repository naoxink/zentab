<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Dashboard - Zen Mode</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="bg-image"></div>
    <div id="overlay"></div>

    <main>
        <div id="weather-container">
            <div id="weather-info">Cargando clima...</div>
        </div>

        <h1 id="clock">00:00</h1>
        <p id="greeting">Buenas, <span id="user-name" contenteditable="true" title="Haz clic para cambiar"
                spellcheck="false">humano</span></p>
        <p id="quote" style="font-style: italic; opacity: 0.7; font-size: 1.1rem; max-width: 600px; margin-top: 20px;">
        </p>

        <!-- Widget To-Do -->
        <div id="todo-container">
            <input type="text" id="todo-input" placeholder="Nueva tarea + Enter...">
            <ul id="todo-list"></ul>
        </div>

        <div id="health-hub">
            <!-- Pomodoro -->
            <div class="pomodoro-timer">
                <span id="timer-display">25:00</span>
                <div class="timer-controls">
                    <button onclick="toggleTimer()" id="timer-btn">▶</button>
                    <button onclick="resetTimer()">↺</button>
                </div>
            </div>

            <!-- Recordatorios Interactivos -->
            <div class="health-alerts">
                <div id="water-alert" class="alert-icon" title="¡Bebe agua!" onclick="acknowledgeAlert('water-alert')">
                    💧</div>
                <div id="stretch-alert" class="alert-icon" title="¡Estírate!"
                    onclick="acknowledgeAlert('stretch-alert')">🧘</div>
            </div>
        </div>

        <!-- Widget de Música por Iframe (El más compatible) -->
        <div id="music-container">
            <div class="mood-buttons">
                <button class="mood-btn" onclick="loadYoutube('lofi', 'jfKfPfyJRdk')">☕ Lo-fi</button>
                <button class="mood-btn" onclick="loadYoutube('epic', '30uS_itXvS0')">⚔️ Épico</button>
                <button class="mood-btn" onclick="loadYoutube('metal', 'P_mZ_D8UvV4')">🤘 Metal</button>
                <button class="mood-btn" onclick="loadYoutube('jazz', '5yx6BWlEVcY')">🎷 Jazz</button>
            </div>

            <div id="player-wrapper"
                style="margin-top: 15px; border-radius: 8px; overflow: hidden; height: 80px; width: 250px;">
                <div id="yt-placeholder"
                    style="font-size: 0.7rem; color: #888; padding: 20px; border: 1px dashed #444;">
                    Selecciona un estilo para cargar el reproductor
                </div>
            </div>
        </div>

        <button id="refresh-bg" onclick="refreshBackground()" title="Cambiar fondo">📷</button>
    </main>
    <script src="app.js"></script>
</body>

</html>
